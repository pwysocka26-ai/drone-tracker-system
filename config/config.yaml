mode: video

video:
  source: video.mp4

yolo:
  model: yolov8s.pt
  backend: track
  tracker: config/bytetrack_fast_acquire.yaml
  conf: 0.10
  imgsz: 1280
  classes: [4]
  inference_every: 1
  search_fallback: true
  search_conf: 0.08
  search_imgsz: 1536
  search_interval: 2

tracker:
  max_missed_frames: 24
  confirm_hits: 2
  max_center_distance: 180.0
  min_iou_for_match: 0.01
  velocity_alpha: 0.65
  history_size: 12

  reacquire_radius_auto: 135.0
  reacquire_radius_manual: 220.0
  sticky_frames: 22
  switch_margin: 0.36
  switch_dwell: 6
  switch_cooldown: 7
  switch_persist: 2
  max_select_missed: 2
  min_start_conf: 0.10
  min_start_hits: 2
  min_confirmed_conf: 0.10
  min_hold_frames: 5
  predicted_dist_px: 95.0
  raw_id_bonus: 1.8
  current_target_bonus: 2.6

handoff:
  soft_active_max_missed: 4
  handoff_reacquire_radius: 165.0
  handoff_hold_frames: 10

narrow:
  hold_frames: 80
