mode: video

video:
  source: video.mp4

yolo:
  model: yolov8s.pt
  backend: track
  tracker: config/bytetrack_fast_acquire.yaml
  conf: 0.10
  imgsz: 1280
  classes: [4]
  inference_every: 1
  search_fallback: true
  search_conf: 0.08
  search_imgsz: 1536
  search_interval: 2

tracker:
  max_missed_frames: 24
  confirm_hits: 2
  max_center_distance: 180.0
  min_iou_for_match: 0.01
  velocity_alpha: 0.65
  history_size: 12
  reacquire_radius_auto: 160.0
  reacquire_radius_manual: 260.0
  sticky_frames: 22
  switch_margin: 0.18
  switch_dwell: 4
  switch_cooldown: 6
  max_select_missed: 1
  min_start_conf: 0.10

narrow:
  hold_frames: 80
