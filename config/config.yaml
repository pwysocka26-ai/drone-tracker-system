mode: video
video:
  source: video.mp4
yolo:
  model: yolov8s.pt
  backend: track
  tracker: config/bytetrack_fast_acquire.yaml
  conf: 0.1
  imgsz: 1280
  classes:
  - 4
  inference_every: 1
  search_fallback: true
  search_conf: 0.08
  search_imgsz: 1536
  search_interval: 2
tracker:
  max_missed_frames: 24
  confirm_hits: 2
  max_center_distance: 180.0
  min_iou_for_match: 0.01
  velocity_alpha: 0.65
  history_size: 12
  reacquire_radius_auto: 135.0
  reacquire_radius_manual: 220.0
  sticky_frames: 10
  switch_margin: 0.15
  switch_dwell: 3
  switch_cooldown: 2
  switch_persist: 1
  max_select_missed: 2
  min_start_conf: 0.1
  min_start_hits: 2
  min_confirmed_conf: 0.1
  min_hold_frames: 5
  predicted_dist_px: 95.0
  raw_id_bonus: 0.8
  current_target_bonus: 1.4
  target_selection_freeze_frames: 4
  use_kalman: true
  kalman_process_noise: 0.03
  kalman_measurement_noise: 0.2
handoff:
  soft_active_max_missed: 4
  handoff_reacquire_radius: 165.0
  handoff_hold_frames: 10
  active_missed_soft_frames: 1
  active_missed_hard_frames: 3
  desync_guard_frames: 1
narrow:
  hold_frames: 80
narrow_control:
  crop_max_step_px: 24.0
  crop_snap_deadband_px: 14.0
  display_center_alpha: 0.78
  display_size_alpha: 0.82
  display_max_center_step: 42.0
  display_max_size_step: 24.0
